{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>The Cappa Luxury Hotel</title>
    <meta name="description"
        content="THE CAPPA is a modern, elegant HTML template for luxury hotels, resorts, and vacation rentals. Fully responsive, customizable, and perfect for hospitality websites.">
    <meta name="author" content="THE CAPPA Luxury Hotel Template by DuruThemes">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="{% static \'img/favicon.png\' %}" type="image/png" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400&family=Barlow:wght@400&family=Gilda+Display&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static \'css/plugins.css\' %}" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>

<body>
    <!-- Preloader -->
    <div class="preloader-bg"></div>
    <div id="preloader">
        <div id="preloader-status">
            <div class="preloader-position loader"> <span></span> </div>
        </div>
    </div>
    <!-- Progress scroll totop -->
    <div class="progress-wrap cursor-pointer">
        <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
            <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
        </svg>
    </div>
    <!-- 404 Page -->
    <section class="comming section-padding"
        style="min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 0;">
        <div class="v-middle w-100">
            <div class="container">
                <div class="row">
                    <div class="col-md-12 text-center">
                        <h1>404</h1>
                        <h2>Not Found</h2>
                    </div>
                </div>
                <div class="row text-center mt-4">
                    <div class="col-md-6 offset-md-3 text-center">
                        <p>The page you are looking for was moved, removed, renamed or never existed.</p>
                        <a href="{% url 'admin_pages:home' %}" class="btn-gold"
                            style="background-color: #aa8453; border: 1px solid #aa8453; color: #fff; padding: 12px 30px; text-transform: uppercase; letter-spacing: 2px; font-size: 13px; font-weight: 500; display: inline-block; border-radius: 5px; transition: all 0.4s ease; text-decoration: none; margin-top: 20px;">Return
                            Home</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- jQuery -->
    <script src="{% static \'js/jquery-3.7.1.min.js\' %}"></script>
    <script src="{% static \'js/jquery-migrate-3.5.0.min.js\' %}"></script>
    <script src="{% static \'js/modernizr-2.6.2.min.js\' %}"></script>
    <script src="{% static \'js/imagesloaded.pkgd.min.js\' %}"></script>
    <script src="{% static \'js/jquery.isotope.v3.0.2.js\' %}"></script>
    <script src="{% static \'js/pace.js\' %}"></script>
    <script src="{% static \'js/popper.min.js\' %}"></script>
    <script src="{% static \'js/bootstrap.min.js\' %}"></script>
    <script src="{% static \'js/scrollIt.min.js\' %}"></script>
    <script src="{% static \'js/jquery.waypoints.min.js\' %}"></script>
    <script src="{% static \'js/owl.carousel.min.js\' %}"></script>
    <script src="{% static \'js/jquery.stellar.min.js\' %}"></script>
    <script src="{% static \'js/jquery.magnific-popup.js\' %}"></script>
    <script src="{% static \'js/YouTubePopUp.js\' %}"></script>
    <script src="{% static \'js/select2.js\' %}"></script>
    <script src="{% static \'js/datepicker.js\' %}"></script>
    <script src="{% static \'js/smooth-scroll.min.js\' %}"></script>
    <script src="{% static \'js/custom.js\' %}"></script>
</body>

</html>
